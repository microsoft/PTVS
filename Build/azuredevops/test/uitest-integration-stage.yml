parameters:
  - name: BinariesDirectory
    type: string
    default: '$(Drop)/binaries'
  - name: CleanupProcesses
    type: string
    default: 'devenv, vshub, microsoft.vshub.server.httphost, python, ipy, microsoft.pythontools.analyzer, vstest.executionengine.x86, vstest.discoveryengine.x86'
  - name: Drop
    type: string
    default: '$(System.ArtifactsDirectory)/$(DefinitionName)'
  - name: TestFilterCriteria
    type: string
    default: 'Priority=0'
  - name: UITestNames
    type: string
    default: ''

steps:
  - task: ExtractFiles@1
    displayName: Extract files
    condition: succeeded()
    inputs:
      archiveFilePatterns: '${{ parameters.Drop }}/TestData.zip'
      destinationFolder: '${{ parameters.Drop }}/TestData'
      cleanDestinationFolder: false
      overwriteExistingFiles: false

  - task: PowerShell@2
    displayName: Cleanup
    condition: succeeded()
    continueOnError: true
    timeoutInMinutes: 5
    inputs:
      targetType: inline
      script: |
        $names = @(
          '${{ parameters.CleanupProcesses }}'
            -split ',' |
            ForEach-Object { $_.Trim() } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
        )
        $running = Get-Process -Name $names -ErrorAction SilentlyContinue
        while ($running) {
          Write-Host 'Killing:'
          $running
          try {
            $running | Stop-Process -Force
          } catch {
          }
          Start-Sleep -Seconds 3
          $running = Get-Process -Name $names -ErrorAction SilentlyContinue
        }
      errorActionPreference: stop
      failOnStderr: true

  - task: CopyFiles@2
    displayName: Copy TestData into binaries
    condition: succeeded()
    continueOnError: true
    inputs:
      SourceFolder: '${{ parameters.Drop }}/TestData'
      Contents: '**'
      TargetFolder: '${{ parameters.BinariesDirectory }}/TestData'
      CleanTargetFolder: 'true'
      OverWrite: 'false'
      flattenFolders: 'false'
      preserveTimestamp: 'false'
      retryCount: '0'

  - task: CopyFiles@2
    displayName: Copy runsettings to binary folder
    condition: succeeded()
    inputs:
      SourceFolder: '${{ parameters.BinariesDirectory }}/TestData'
      Contents: 'ptvs.runsettings'
      TargetFolder: '${{ parameters.BinariesDirectory }}'
      CleanTargetFolder: 'false'
      OverWrite: 'false'
      flattenFolders: 'false'
      preserveTimestamp: 'false'
      retryCount: '0'

  - task: PowerShell@2
    displayName: Skip Verification
    condition: succeeded()
    inputs:
      targetType: inline
      script: |
        reg import "${{ parameters.BinariesDirectory }}\TestData\EnableSkipVerification.reg"
      errorActionPreference: stop
      failOnStderr: false

  - task: PowerShell@2
    displayName: Validate TestData and set _TESTDATA_ROOT_PATH
    condition: succeeded()
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        $binariesDirectory = '${{ parameters.BinariesDirectory }}'
        $dropDirectory = '${{ parameters.Drop }}'

        $probePaths = @(
          (Join-Path $binariesDirectory 'TestData'),
          (Join-Path $dropDirectory 'TestData')
        )

        Write-Host "Current directory: $(Get-Location)"
        Write-Host "Binaries directory: $binariesDirectory"
        Write-Host "Drop directory: $dropDirectory"
        Write-Host "Probe paths:"
        $probePaths | ForEach-Object { Write-Host "  $_" }

        $resolvedRoot = $null
        foreach ($probe in $probePaths) {
          if (Test-Path -LiteralPath $probe -PathType Container) {
            $resolvedRoot = Split-Path -Path $probe -Parent
            break
          }
        }

        if (-not $resolvedRoot) {
          throw "Cannot locate TestData before running UI tests. CurrentDirectory=$(Get-Location); Probes=$($probePaths -join ' | ')"
        }

        Write-Host "Using _TESTDATA_ROOT_PATH: $resolvedRoot"
        Write-Host "##vso[task.setvariable variable=_TESTDATA_ROOT_PATH]$resolvedRoot"
      errorActionPreference: stop
      failOnStderr: false

  - task: PowerShell@2
    displayName: Resolve devenv.exe for UI tests
    condition: succeeded()
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'

        function Try-ResolveDevenv {
          param([string]$BasePath)

          if ([string]::IsNullOrWhiteSpace($BasePath)) {
            return $null
          }

          $trimmed = $BasePath.Trim()
          $candidates = @()

          if ($trimmed.EndsWith('devenv.exe', [System.StringComparison]::OrdinalIgnoreCase)) {
            $candidates += $trimmed
          } else {
            $candidates += (Join-Path $trimmed 'devenv.exe')
            $candidates += (Join-Path $trimmed 'Common7\IDE\devenv.exe')
          }

          foreach ($candidate in $candidates) {
            if (Test-Path -LiteralPath $candidate -PathType Leaf) {
              return $candidate
            }
          }

          return $null
        }

        $devenv = $null

        foreach ($envName in @('VisualStudio_IDE','VSAPPIDDIR','DevEnvDir','VSINSTALLDIR')) {
          $devenv = Try-ResolveDevenv -BasePath $env:$envName
          if ($devenv) {
            Write-Host "Resolved devenv from env $envName: $devenv"
            break
          }
        }

        if (-not $devenv) {
          $vswherePaths = @(
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe",
            "${env:ProgramFiles}\Microsoft Visual Studio\Installer\vswhere.exe"
          )

          $vswhere = $vswherePaths | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1
          if (-not $vswhere) {
            throw "Could not find vswhere.exe. Checked: $($vswherePaths -join ' | ')"
          }

          $installPath = & $vswhere -version "[17.0,19.0)" -latest -products * -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw "vswhere.exe did not return a Visual Studio installation path"
          }

          $devenv = Join-Path $installPath 'Common7\IDE\devenv.exe'
          if (-not (Test-Path -LiteralPath $devenv -PathType Leaf)) {
            throw "Resolved Visual Studio install path does not contain devenv.exe: $devenv"
          }

          Write-Host "Resolved devenv via vswhere: $devenv"
        }

        $idePath = Split-Path -Path $devenv -Parent
        $installDir = Split-Path -Path (Split-Path -Path $idePath -Parent) -Parent

        Write-Host "Resolved IDE path: $idePath"
        Write-Host "Resolved install dir: $installDir"
        Write-Host "##vso[task.setvariable variable=ResolvedDevEnvExe]$devenv"
        Write-Host "##vso[task.setvariable variable=ResolvedVSIDEPath]$idePath"
        Write-Host "##vso[task.setvariable variable=ResolvedVSInstallDir]$installDir"
      errorActionPreference: stop
      failOnStderr: false

  - task: VSTest@2
    displayName: '[MultiConfiguration] Run UI Test ${{ parameters.UITestNames }}'
    condition: succeeded()
    continueOnError: true
    inputs:
      testSelector: testAssemblies
      testAssemblyVer2: '${{ parameters.UITestNames }}UITestsRunner.dll'
      tcmTestRun: '$(test.RunId)'
      searchFolder: '${{ parameters.BinariesDirectory }}'
      resultsFolder: '$(Agent.TempDirectory)/TestResults'
      testFiltercriteria: '${{ parameters.TestFilterCriteria }}'
      runOnlyImpactedTests: false
      runAllTestsAfterXBuilds: 50
      uiTests: true
      vstestLocationMethod: version
      vsTestVersion: latest
      runSettingsFile: '${{ parameters.BinariesDirectory }}\\ptvs.runsettings'
      overrideTestrunParameters: '-TargetFrameworkVersion .NETFramework,Version=v4.7.2'
      runInParallel: false
      runTestsInIsolation: false
      codeCoverageEnabled: true
      distributionBatchType: basedOnExecutionTime
      batchingBasedOnAgentsOption: autoBatchSize
      customBatchSizeValue: 10
      batchingBasedOnExecutionTimeOption: customTimeBatchSize
      customRunTimePerBatchValue: 300
      dontDistribute: false
      testRunTitle: '${{ parameters.UITestNames }} UI Tests'
      publishRunAttachments: true
      failOnMinTestsNotRun: false
      minimumExpectedTests: 1
      diagnosticsEnabled: true
      collectDumpOn: onAbortOnly
      rerunFailedTests: true
      rerunType: basedOnTestFailurePercentage
      rerunFailedThreshold: 50
      rerunFailedTestCasesMaxLimit: 5
      rerunMaxAttempts: 2
    env:
      _TESTDATA_ROOT_PATH: $(_TESTDATA_ROOT_PATH)
      VisualStudio_IDE: $(ResolvedVSIDEPath)
      VSAPPIDDIR: $(ResolvedVSIDEPath)
      DevEnvDir: $(ResolvedVSIDEPath)
      VSINSTALLDIR: $(ResolvedVSInstallDir)

  - task: PowerShell@2
    displayName: Cleanup
    condition: succeeded()
    timeoutInMinutes: 5
    inputs:
      targetType: inline
      script: |
        $names = @(
          '${{ parameters.CleanupProcesses }}'
            -split ',' |
            ForEach-Object { $_.Trim() } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
        )
        $running = Get-Process -Name $names -ErrorAction SilentlyContinue
        while ($running) {
          Write-Host 'Killing:'
          $running
          try {
            $running | Stop-Process -Force
          } catch {
          }
          Start-Sleep -Seconds 3
          $running = Get-Process -Name $names -ErrorAction SilentlyContinue
        }
      errorActionPreference: stop
      failOnStderr: true
