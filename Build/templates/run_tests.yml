parameters:
- name: refreshGlassCache
  type: boolean
  default: false

steps:
  # Install different python versions
  - template: ./install_python.yml
    parameters:
      pythonVersion: '3.9.13' # Last version with an installer
  - template: ./install_python.yml
    parameters:
      pythonVersion: '3.10.11' # Last version with an installer
  - template: ./install_python.yml
    parameters:
      pythonVersion: '3.11.9' # Last version with an installer
  - template: ./install_python.yml
    parameters:
      pythonVersion: '3.12.7'
      outputVar: InstallPython312
  - template: ./install_python.yml
    parameters:
      pythonVersion: '3.13.0'
  
  # Find the environment variable for the install of 3.12
  - powershell: |
      $suffix = '_INSTALLPYTHON312'
      $envVars = Get-ChildItem Env:

      foreach ($envVar in $envVars) {
        if ($envVar.Name.EndsWith($suffix)) {
          echo "##vso[task.setvariable variable=PYTHON_INTERPRETER]$($envVar.Value)\python.exe"
          break
        }
      }  
    displayName: 'Set PYTHON_INTERPRETER variable'

  - task: PythonScript@0
    displayName: 'Test python path'
    env:
      SYSTEM_ACCESSTOKEN: $(DropToken)
    inputs:
      scriptSource: 'inline' # 'filePath' | 'inline'. Required. Script source. Default: filePath.
      script: |
        import sys
        print(sys.executable)
        print(sys.version)
        print(sys.path)
      workingDirectory: $(Build.SourcesDirectory)
      failOnStderr: true
      pythonInterpreter: $(PYTHON_INTERPRETER)

  # Download binaries from the build job instead of rebuilding
  - download: current
    artifact: Binaries
    displayName: 'Download build binaries'

  # Copy downloaded binaries to the expected location
  - powershell: |
      $source = '$(Pipeline.Workspace)\Binaries'
      $dest = '$(Build.BinariesDirectory)\raw\binaries'
      New-Item -ItemType Directory -Force -Path $dest | Out-Null
      Copy-Item -Path "$source\*" -Destination $dest -Recurse -Force
    displayName: 'Copy binaries to expected location'

  - task: Cache@2
    displayName: 'Restore glass binaries from cache'
    condition: eq('${{ parameters.refreshGlassCache }}', 'false')
    inputs:
      key: 'glass | Build/setup_glass.py'
      path: '$(Build.SourcesDirectory)\GlassTests'
      cacheHitVar: 'CACHE_RESTORED'

  - powershell: |
      $isForkPr = '$(System.PullRequest.IsFork)' -eq 'True'
      $refreshGlassCache = '${{ parameters.refreshGlassCache }}' -eq 'true'
      $cacheState = '$(CACHE_RESTORED)'
      $cacheRestored = $cacheState -eq 'true' -or $cacheState -eq 'inexact'
      $setupGlass = -not $isForkPr -and ($cacheState -eq 'false' -or $refreshGlassCache)
      $runGlass = $cacheRestored -or $setupGlass
      $forkCacheMiss = $isForkPr -and -not $cacheRestored -and -not $refreshGlassCache

      Write-Host "CACHE_RESTORED=$cacheState"
      Write-Host "##vso[task.setvariable variable=SETUP_GLASS]$($setupGlass.ToString().ToLowerInvariant())"
      Write-Host "##vso[task.setvariable variable=RUN_GLASS]$($runGlass.ToString().ToLowerInvariant())"
      Write-Host "##vso[task.setvariable variable=FORK_GLASS_CACHE_MISS]$($forkCacheMiss.ToString().ToLowerInvariant())"
    displayName: 'Set Glass test conditions'

  - task: AzureCLI@2
    displayName: 'Acquire an AAD token from a User-Assigned Managed Identity and save it as secret variable DropToken'
    condition: and(succeeded(), eq(variables['SETUP_GLASS'], 'true'))
    inputs:
      azureSubscription: 'PylanceSecureVsIdePublishWithManagedIdentity'
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        # if this fails, check out this bash script that includes diagnostics:
        # https://gist.github.com/johnterickson/19f80a3e969e39f1000d118739176e62
        
        # Note that the resoruce is specified to limit the token to Azure DevOps
        $token = az account get-access-token --query accessToken --resource 499b84ac-1321-427f-aa17-267ca6975798 -o tsv
        Write-Host "##vso[task.setvariable variable=DropToken;issecret=true]$token"      

  # Setup the glass test folder
  - task: PythonScript@0
    displayName: 'Setup glass test folder'
    condition: and(succeeded(), eq(variables['SETUP_GLASS'], 'true'))
    env:
      SYSTEM_ACCESSTOKEN: $(DropToken)
    inputs:
      scriptSource: 'filePath' # 'filePath' | 'inline'. Required. Script source. Default: filePath.
      scriptPath: $(Build.SourcesDirectory)/Build/setup_glass.py
      arguments: '--authTokenVariable SYSTEM_ACCESSTOKEN --buildOutput $(Build.BinariesDirectory)\raw\binaries'
      workingDirectory: $(Build.SourcesDirectory)
      failOnStderr: true
      pythonInterpreter: $(PYTHON_INTERPRETER)

  - task: Cache@2
    displayName: 'Cache glass binaries'
    condition: and(succeeded(), eq(variables['SETUP_GLASS'], 'true'))
    inputs:
      key: 'glass | Build/setup_glass.py'
      path: '$(Build.SourcesDirectory)\GlassTests'

  - powershell: |
      Write-Error "GlassTests cache was not restored for this fork PR, and fork PRs cannot run setup_glass.py because the internal DevDiv drop token is unavailable. For changes that need Glass setup or cache refresh, create the PR from a branch in the upstream microsoft/PTVS repository instead of a fork, or ask a maintainer to run a trusted main/release build to populate the 'glass' cache before rerunning this PR validation."
    displayName: 'Fail Glass tests on fork cache miss'
    condition: and(succeeded(), eq(variables['FORK_GLASS_CACHE_MISS'], 'true'))

  # Run the glass tests
  - task: PythonScript@0
    displayName: 'Run Glass tests'
    condition: and(succeeded(), eq(variables['RUN_GLASS'], 'true'))
    inputs:
      scriptSource: 'filePath' # 'filePath' | 'inline'. Required. Script source. Default: filePath.
      scriptPath: $(Build.SourcesDirectory)/Build/run_glass.py
      arguments: '--buildOutput $(Build.BinariesDirectory)\raw\binaries'
      workingDirectory: $(Build.SourcesDirectory)
      failOnStderr: true
      pythonInterpreter: $(PYTHON_INTERPRETER)

  # Upload the trx file as a test result
  - task: PublishTestResults@2
    condition: and(always(), eq(variables['RUN_GLASS'], 'true'))
    displayName: 'Publish Glass test results'
    inputs:
      testResultsFiles: '$(Build.SourcesDirectory)/TestResults/*.trx'
      testRunTitle: 'Glass Tests'
      testResultsFormat: 'VSTest'
      failTaskOnFailedTests: true
